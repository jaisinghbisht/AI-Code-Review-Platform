services:
  db:
    image: postgres:14.1-alpine
    restart: always
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=ai_code_review
    ports:
      - '5432:5432'
    volumes:
      - db_data:/var/lib/postgresql/data

  app:
    build:
      context: ./backend
    restart: on-failure
    depends_on:
      - db
    ports:
      - '8080:8080'
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/ai_code_review
      - SPRING_DATASOURCE_USERNAME=user
      - SPRING_DATASOURCE_PASSWORD=password
      - SPRING_FLYWAY_URL=jdbc:postgresql://db:5432/ai_code_review
      - SPRING_FLYWAY_USER=user
      - SPRING_FLYWAY_PASSWORD=password
      - SPRING_AI_OLLAMA_BASE_URL=http://host.docker.internal:11434
      - SPRING_AI_OLLAMA_CHAT_OPTIONS_MODEL=qwen2.5-coder:7b

volumes:
  db_data:
